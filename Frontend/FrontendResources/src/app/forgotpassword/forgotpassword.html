<!-- src/app/forgotpassword/forgotpassword.html -->

<div class="wrapper">
  <h1>Forgot Password</h1>
  
  <div class="info-text">
    <p>Don't worry! Enter your email address below and we'll send you a link to reset your password.</p>
  </div>

  <form (ngSubmit)="onSubmit()">
    
    <!-- CAMPO EMAIL -->
    <div>
      <label for="email-input">
        <span>@</span>
      </label>
      <input
        type="email"
        id="email-input"
        [(ngModel)]="email"
        name="email"
        placeholder="Email"
        required
      >
    </div>

    <!-- MESSAGGIO DI SUCCESSO -->
    <div *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </div>

    <!-- MESSAGGIO DI ERRORE -->
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <!-- BOTTONE SEND RESET LINK -->
    <button 
      type="submit"
      [disabled]="isLoading || !email"
    >
      {{ isLoading ? 'Invio in corso...' : 'Send Reset Link' }}
    </button>
  </form>

  <p>Remember your password? <a routerLink="/loginv2">Back to Login</a></p>
</div>
