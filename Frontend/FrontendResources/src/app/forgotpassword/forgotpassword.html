<!-- src/app/forgot-password/forgot-password.html -->

<div class="wrapper">
    <h1>Forgot Password</h1>
    
    <div class="info-text">
      <p>Don't worry! Enter your email address below and we'll send you a link to reset your password.</p>
    </div>
  
    <form>
      
      <!-- CAMPO EMAIL -->
      <div>
        <label for="email-input">
          <span>@</span>
        </label>
        <input
          type="email"
          id="email-input"
          placeholder="Email"
          required
        >
      </div>
  
      <!-- BOTTONE SEND RESET LINK -->
      <button type="submit">
        Send Reset Link
      </button>
    </form>
  
    <p>Remember your password? <a routerLink="/loginv2">Back to Login</a></p>
  </div>
