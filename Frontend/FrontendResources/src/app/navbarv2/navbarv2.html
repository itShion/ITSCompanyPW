<div class="navbar">
    <input type="checkbox" id="sidebar-active">

    <label for="sidebar-active" class="open-sidebar-button">
        <svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 -960 960 960" width="32px">
            <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
        </svg>
    </label>

    <div class="brand">
      <img src="logo.jpg" alt="Uffezzi Logo">
    </div>

    <label id="overlay" for="sidebar-active"></label>

    <div class="links-container">
        <label for="sidebar-active" class="close-sidebar-button">
            <svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 -960 960 960" width="32px">
                <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
            </svg>
        </label>

        <a class="home-link" routerLink="/">Home</a>
        <a routerLink="/ricercaPrenotazione">Prenota Postazione</a>
        <a routerLink="/miePrenotazioni">Le Mie Prenotazioni</a>

        <a *ngIf="showSupport$ | async" routerLink="/supporto">Supporto</a>

    <!-- Login Utente -->
    <div class="user-dropdown">
      <a class="dropdown-trigger" (click)="toggleDropdown()">
        <div class="user-icon">
          {{ currentUser?.username.charAt(0) || 'U' }}
        </div>
        <span>{{ currentUser?.username || 'Utente' }}</span>
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          height="20px" 
          viewBox="0 -960 960 960" 
          width="20px"
          [style.transform]="isDropdownOpen ? 'rotate(180deg)' : 'rotate(0deg)'"
          style="transition: transform 0.3s ease;"
        >
          <path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/>
        </svg>
      </a>
      
      <div class="dropdown-menu" [class.show]="isDropdownOpen">
        <div class="dropdown-header">
          <small>Accesso come: {{ currentUser?.username }}</small>
        </div>
        
        <div class="dropdown-divider"></div>
        
        <a class="dropdown-item">
          <i class="bi bi-person"></i>
          <span>Profilo</span>
        </a>
        
        <a class="dropdown-item">
          <i class="bi bi-gear"></i>
          <span>Impostazioni</span>
        </a>
        
        <div class="dropdown-divider"></div>
        
        <a class="dropdown-item logout" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
          <span>Logout</span>
        </a>
      </div>
    </div>

      <ng-template #loginButton>
        <a class="login-link" routerLink="/loginv2">Accedi</a>
      </ng-template>
    </div>

</div>
