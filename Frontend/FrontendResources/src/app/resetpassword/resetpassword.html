<!-- src/app/resetpassword/resetpassword.html -->

<div class="wrapper">
    <h1>Reset Password</h1>
  
    <!-- Se il link è valido -->
    <div *ngIf="!invalidLink">
      <div class="info-text">
        <p>Enter your new password below.</p>
      </div>
  
      <form (ngSubmit)="onSubmit()">
  
        <!-- CAMPO NUOVA PASSWORD -->
        <div>
          <label for="password-input">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed">
              <path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/>
            </svg>
          </label>
          <input
            type="password"
            id="password-input"
            [(ngModel)]="password"
            name="password"
            placeholder="New Password"
            required
          >
        </div>
  
        <!-- CAMPO CONFERMA PASSWORD -->
        <div>
          <label for="confirm-password-input">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed">
              <path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/>
            </svg>
          </label>
          <input
            type="password"
            id="confirm-password-input"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm Password"
            required
          >
        </div>
  
        <!-- MESSAGGIO DI SUCCESSO -->
        <div *ngIf="successMessage" class="success-message">
          {{ successMessage }}
          <br><small>Reindirizzamento al login...</small>
        </div>
  
        <!-- MESSAGGIO DI ERRORE -->
        <div *ngIf="errorMessage && !invalidLink" class="error-message">
          {{ errorMessage }}
        </div>
  
        <!-- BOTTONE RESET PASSWORD -->
        <button
          type="submit"
          [disabled]="isLoading || !password || !confirmPassword"
        >
          {{ isLoading ? 'Aggiornamento...' : 'Reset Password' }}
        </button>
      </form>
    </div>
  
    <!-- Se il link NON è valido -->
    <div *ngIf="invalidLink">
      <div class="error-message" style="margin-top: 20px;">
        {{ errorMessage }}
      </div>
      <p style="margin-top: 20px;">
        <a routerLink="/forgotpassword">Request a new reset link</a>
      </p>
    </div>
  
    <p style="margin-top: 20px;">Remember your password? <a routerLink="/loginv2">Back to Login</a></p>
  </div>
