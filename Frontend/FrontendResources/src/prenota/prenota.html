
    <label for="utente">Utente:</label><br>
    <input type="text" id="utente" name="utente" value="{{ user?.username }}" readonly><br>
  
    <label for="risorsa">
      Risorsa: 
      @if (risorsa()) {
          {{ risorsa()?.nome }}
      } @else {
          Caricamento...
      }
    </label><br>
  
    <label for="dInizio">Data Inizio:</label><br>
    <input type="date" id="dInizio" name="dInizio" [(ngModel)]="dataInizio"><br>
  
    <label for="dFine">Data Fine:</label><br>
    <input type="date" id="dFine" name="dFine" [(ngModel)]="dataFine"><br>
  
    <button (click)="prenota()">PRENOTA</button>
